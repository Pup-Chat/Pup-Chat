<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — PupChat</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .profile-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FF1493, #4169E1);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border: 5px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .profile-name {
            font-size: 2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        
        .profile-email {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .profile-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-profile {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-profile:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .back-link {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="profile-page">
        <div class="profile-card">
            <div class="profile-avatar">😊</div>
            <h1 class="profile-name" id="profileName">Пупс</h1>
            <p class="profile-email" id="profileEmail">email@example.com</p>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-value" id="statCoins">0</span>
                    <span class="stat-label">💰 Монет</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="statLevel">1</span>
                    <span class="stat-label">⭐ Уровень</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="statMessages">0</span>
                    <span class="stat-label">💬 Сообщений</span>
                </div>
            </div>
            
            <div class="profile-actions">
                <button class="btn-profile btn-primary">🛍 Магазин</button>
                <button class="btn-profile btn-secondary">👕 Инвентарь</button>
                <button class="btn-profile btn-secondary">🏆 Достижения</button>
            </div>
        </div>
        
        <a href="room.html" class="back-link">← Вернуться в комнату</a>
    </div>
    
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/profile.js"></script>
</body>
</html>
