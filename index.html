<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PupChat — Виртуальный чат</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="landing-page">
        <div class="landing-content">
            <h1>🐾 PupChat</h1>
            <p class="subtitle">Твой пупс. Твоя комната. Твоя компания.</p>
            
            <div class="auth-buttons">
                <button id="loginBtn" class="btn btn-primary">🔐 Войти</button>
                <button id="registerBtn" class="btn btn-secondary">📝 Регистрация</button>
            </div>
            
            <div class="features">
                <div class="feature">
                    <h3>💬 Общайся</h3>
                    <p>Чат в реальном времени</p>
                </div>
                <div class="feature">
                    <h3> Одевайся</h3>
                    <p>Кастомизируй пупса</p>
                </div>
                <div class="feature">
                    <h3>🎮 Играй</h3>
                    <p>Зарабатывай монеты</p>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
