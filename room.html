<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комната — PupChat</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="room-container">
        <header class="room-header">
            <h2>🐾 PupChat — Комната #1</h2>
            <div class="user-info">
                <span id="userName">Пупс</span>
                <span id="userCoins">💰 0</span>
                <button id="logoutBtn" class="btn-logout">🚪 Выйти</button>
            </div>
        </header>
        
        <div class="chat-panel-top">
            <div id="chatMessages" class="chat-messages"></div>
            <form id="chatForm" class="chat-form">
                <input type="text" id="chatInput" placeholder="Напиши сообщение..." maxlength="200" autocomplete="off">
                <button type="submit" class="btn-send">➤</button>
            </form>
        </div>
        
        <div class="room-content-full">
            <canvas id="roomCanvas"></canvas>
        </div>
        
        <div class="room-controls">
            <button id="emotionBtn" class="btn-control">😊 Эмоции</button>
            <button id="profileBtn" class="btn-control">👤 Профиль</button>
            <button id="shopBtn" class="btn-control">🛍 Магазин</button>
        </div>
    </div>
    
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/room.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
