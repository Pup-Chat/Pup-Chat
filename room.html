<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комната — PupChat</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="room-container">
        <header class="room-header">
            <h2>🐾 PupChat — Комната #1</h2>
            <div class="user-info">
                <span id="userName">Пупс</span>
                <span id="userCoins">💰 0</span>
                <button id="logoutBtn" class="btn-small">Выйти</button>
            </div>
        </header>
        
        <div class="room-content">
            <div class="room-canvas-wrapper">
                <canvas id="roomCanvas" width="800" height="600"></canvas>
            </div>
            
            <div class="chat-panel">
                <div id="chatMessages" class="chat-messages"></div>
                <form id="chatForm" class="chat-form">
                    <input type="text" id="chatInput" placeholder="Напиши сообщение..." maxlength="200">
                    <button type="submit" class="btn-small">➤</button>
                </form>
            </div>
        </div>
        
        <div class="room-controls">
            <button id="emotionBtn" class="btn">😊 Эмоции</button>
            <button id="profileBtn" class="btn">👤 Профиль</button>
            <button id="shopBtn" class="btn">🛍 Магазин</button>
        </div>
    </div>
    
    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/room.js"></script>
    <script type="module" src="scripts/chat.js"></script>
</body>
</html>
