<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комната — PupChat</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="room-wrapper">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="top-left">
                <h1>🐾 PupChat</h1>
                <span class="room-name">— Комната #1</span>
            </div>
            <div class="top-right">
                <span class="user-name" id="userName">Пупс</span>
                <span class="user-coins" id="userCoins">💰 0</span>
                <button id="logoutBtn" class="btn-exit">🚪 Выйти</button>
            </div>
        </div>

        <!-- Основная область -->
        <div class="main-area">
            <!-- Левая часть: комната с пупсами -->
            <div class="room-view">
                <canvas id="roomCanvas"></canvas>
            </div>

            <!-- Правая часть: чат и инфо -->
            <div class="side-panel">
                <div class="chat-container">
                    <div id="chatMessages" class="chat-messages"></div>
                    <form id="chatForm" class="chat-input-form">
                        <input type="text" id="chatInput" placeholder="Напиши сообщение..." maxlength="200" autocomplete="off">
                        <button type="submit" class="btn-send">➤</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Нижняя панель с кнопками -->
        <div class="bottom-bar">
            <button id="emotionBtn" class="nav-btn">😊 Эмоции</button>
            <button id="profileBtn" class="nav-btn">👤 Профиль</button>
            <button id="shopBtn" class="nav-btn">🛍 Магазин</button>
            <button id="settingsBtn" class="nav-btn">⚙️ Настройки</button>
        </div>
    </div>

    <script type="module" src="scripts/firebase-config.js"></script>
    <script type="module" src="scripts/room.js"></script>
    <script type="module" src="scripts/chat.js"></script>
    <script>
// При загрузке страницы проверяем сессию
window.addEventListener('beforeunload', () => {
    // Сохраняем состояние
    sessionStorage.setItem('wasInRoom', 'true');
});

// Очищаем при выходе
window.addEventListener('unload', () => {
    sessionStorage.removeItem('wasInRoom');
});
</script>
</body>
</html>
